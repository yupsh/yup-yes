name: Release

# Auto-version on merge to main: nicerobot/tools.build/tag computes the next
# SemVer from Conventional Commits (feat → minor, else patch; capped at minor,
# never major) and pushes the tag, then goreleaser builds the release for that
# tag in the SAME job — a tag pushed by GITHUB_TOKEN does not re-trigger a
# separate tags-triggered workflow, so tagging and releasing must share one run.
#
# Opt out per repo: commit a `.no-autorelease` file to the root; the tag action
# detects it and no-ops, and `make release` is skipped.
on:
  push:
    branches: [main]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0   # full history + tags for SemVer computation and the goreleaser changelog
      - id: tag
        uses: nicerobot/tools.build/tag@v2
      - uses: actions/setup-go@v5
        if: steps.tag.outputs.bumped == 'true'
        with:
          go-version: "1.26"
          check-latest: true
          cache: true
      - run: make release
        if: steps.tag.outputs.bumped == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
