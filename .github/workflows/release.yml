# Managed by nicerobot/tools.repository (distribute-build)
name: release
on:
  push:
    branches: [main]
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false
permissions:
  contents: write
jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      # Full history + tags so the SemVer computation sees every prior tag; default
      # persist-credentials (true) is REQUIRED here — this job pushes the new tag.
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      # Opt out per repo by committing a `.no-autorelease` file to the root: the
      # action detects it and no-ops, so re-distribution can't silently re-enable it.
      - uses: nicerobot/tools.build/tag@v2
